name: MailMug SMTP Sandbox Email Testing
description: Test and inspect application emails with MailMug SMTP Sandbox
author: MailMug

branding:
  icon: mail
  color: blue

inputs:
  api-key:
    description: MailMug API key
    required: true

  inbox:
    description: MailMug inbox ID
    required: true

  subject:
    description: Optional email subject to search for
    required: false

runs:
  using: node24
  main: dist/index.js
